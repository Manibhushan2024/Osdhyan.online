name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend Lint & Typecheck ──────────────────────────────────────────────
  portal-lint:
    name: Portal — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ─── Next.js Build Sanity Check ─────────────────────────────────────────────
  portal-build:
    name: Portal — Build
    runs-on: ubuntu-latest
    needs: portal-lint
    defaults:
      run:
        working-directory: apps/portal

    env:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api"
      NEXT_PUBLIC_STORAGE_URL: "http://localhost:8000/storage"
      NEXT_PUBLIC_SITE_URL: "https://osdhyan.com"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─── Backend PHP Syntax Check ────────────────────────────────────────────────
  backend-syntax:
    name: Backend — PHP Syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: cs2pr
          coverage: none

      - name: Check PHP syntax (all files)
        run: |
          find backend/app backend/routes -name "*.php" \
            -exec php -l {} \; \
            | grep -v "No syntax errors" \
            | tee /tmp/php-errors.txt
          [ ! -s /tmp/php-errors.txt ]

  # ─── Mobile Typecheck ────────────────────────────────────────────────────────
  mobile-typecheck:
    name: Mobile — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/osdhyan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/osdhyan/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
