services:
  - type: web
    name: osdhyan-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: OSDHYAN
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: osdhyan-backend
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: REDIS_URL
        sync: false   # set manually in Render dashboard
      - key: REDIS_CLIENT
        value: predis
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: FILESYSTEM_DISK
        value: local
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false   # set to your Vercel domain
      - key: FRONTEND_URL
        sync: false   # set to your Vercel URL
